version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/storage/postgres/sqlc/queries.sql"
    schema: "./migrations/postgres"
    gen:
      go:
        package: "sqlc"
        out: "./internal/storage/postgres/sqlc/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true